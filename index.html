<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOW — Women's Workout Playlist</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #FF4D7E; --peach: #FF8C61; --lavender: #B06FE8;
    --mint: #3EDCB0; --gold: #FFB347; --dark: #0E0C12;
    --card: #17141F; --muted: #888; --white: #F8F4FF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--white); font-family: 'Nunito', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 20%, rgba(255,77,126,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 90% 80%, rgba(176,111,232,0.11) 0%, transparent 60%);
    z-index: 0; pointer-events: none;
  }
  .container { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 28px 16px 60px; }
  header { text-align: center; margin-bottom: 32px; }
  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(52px, 14vw, 96px); letter-spacing: -2px; line-height: 0.9;
    background: linear-gradient(135deg, var(--rose), var(--peach), var(--lavender));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    display: inline-block; animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.15)} }
  .tagline { font-size: 13px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--mint); margin-top: 6px; }
  .filters { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 28px; }
  .filter-btn {
    background: var(--card); border: 1.5px solid #2e2a38; color: var(--muted);
    border-radius: 40px; padding: 8px 18px; font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active {
    background: linear-gradient(135deg, var(--rose), var(--lavender));
    border-color: transparent; color: #fff; box-shadow: 0 0 18px rgba(255,77,126,0.35);
  }
  .generate-wrap { text-align: center; margin-bottom: 36px; }
  .generate-btn {
    background: linear-gradient(135deg, var(--rose) 0%, var(--peach) 50%, var(--lavender) 100%);
    border: none; color: #fff; font-family: 'Black Han Sans', sans-serif;
    font-size: 20px; letter-spacing: 2px; padding: 16px 44px; border-radius: 50px;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 30px rgba(255,77,126,0.35); text-transform: uppercase;
  }
  .generate-btn:hover { transform: scale(1.04); box-shadow: 0 8px 40px rgba(255,77,126,0.5); }
  .generate-btn:active { transform: scale(0.98); }
  .timer-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid #26222f;
    border-radius: 16px; padding: 14px 20px; margin-bottom: 24px;
  }
  .timer-label { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .timer-total { font-family: 'Black Han Sans', sans-serif; font-size: 24px; color: var(--mint); }
  .progress-track { flex: 1; height: 8px; background: #2a2535; border-radius: 99px; margin: 0 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--lavender)); border-radius: 99px; transition: width 0.5s ease; }
  .playlist { display: flex; flex-direction: column; gap: 12px; }
  .workout-card {
    background: var(--card); border: 1px solid #252030; border-radius: 16px;
    padding: 16px 18px; display: flex; align-items: center; gap: 14px;
    transition: border-color 0.2s, transform 0.15s;
    animation: slideIn 0.35s ease both; text-decoration: none; color: inherit;
  }
  .workout-card:hover { border-color: var(--rose); transform: translateX(4px); }
  @keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .card-num { font-family: 'Black Han Sans', sans-serif; font-size: 22px; color: #3a333f; min-width: 30px; text-align: center; }
  .tag-dot { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--white); margin-bottom: 3px; }
  .card-meta { font-size: 12px; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .meta-tag { background: #252030; border-radius: 6px; padding: 2px 8px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .card-duration { font-family: 'Black Han Sans', sans-serif; font-size: 17px; color: var(--gold); min-width: 50px; text-align: right; }
  .yt-btn {
    background: var(--rose); border: none; border-radius: 8px; color: #fff;
    font-size: 11px; font-weight: 800; padding: 5px 10px; cursor: pointer;
    letter-spacing: 0.5px; text-transform: uppercase; text-decoration: none;
    white-space: nowrap; transition: background 0.15s;
  }
  .yt-btn:hover { background: #e0345f; }
  .empty-state { text-align: center; padding: 60px 20px; color: #444; }
  .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
  .empty-state p { font-size: 16px; font-weight: 700; }
  .section-label { font-size: 11px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; padding-left: 4px; }
  .segment-divider { display: flex; align-items: center; gap: 10px; margin: 6px 0 2px; }
  .seg-label { font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .seg-line { flex: 1; height: 1px; background: #28222f; }
  .warmup-label { background: rgba(62,220,176,0.15); color: var(--mint); }
  .main-label { background: rgba(255,77,126,0.15); color: var(--rose); }
  .cool-label { background: rgba(176,111,232,0.15); color: var(--lavender); }
  footer { text-align: center; margin-top: 40px; font-size: 11px; color: #444; font-weight: 600; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">GLOW</div>
    <div class="tagline">Women's ~65-Min Workout Playlist Generator</div>
  </header>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">All Styles</button>
    <button class="filter-btn" data-cat="dance">Dance Cardio</button>
    <button class="filter-btn" data-cat="hiit">HIIT</button>
    <button class="filter-btn" data-cat="pilates">Pilates</button>
    <button class="filter-btn" data-cat="strength">Strength</button>
    <button class="filter-btn" data-cat="yoga">Yoga Flow</button>
  </div>

  <div class="generate-wrap">
    <button class="generate-btn" id="generateBtn">Generate My Playlist</button>
  </div>

  <div id="playlistSection" style="display:none">
    <div class="timer-bar">
      <span class="timer-label">Total Time</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="timer-total" id="timerTotal">0 min</span>
    </div>
    <div class="section-label" id="playlistLabel"></div>
    <div class="playlist" id="playlist"></div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="icon">🌸</div>
    <p>Pick your style and hit Generate!</p>
  </div>

  <footer>LINKS OPEN YOUTUBE WITH DURATION FILTER · LISTEN TO YOUR BODY</footer>
</div>

<script>
var activeFilter = 'all';

var warmupPool = [
  { title: "5-Min Full Body Warm Up for Women", channel: "Sydney Cummings", dur: 5, cat: "hiit", emoji: "⚡", q: "Sydney Cummings 5 minute warm up women" },
  { title: "Pilates Warm Up Gentle Activation", channel: "Move with Nicole", dur: 5, cat: "pilates", emoji: "🌸", q: "Move with Nicole pilates warm up 5 minutes" },
  { title: "Dance Cardio Warm Up Party", channel: "Fitness Marshall", dur: 5, cat: "dance", emoji: "💃", q: "Fitness Marshall dance cardio warm up 5 min" },
  { title: "Yoga Morning Warm Up Flow", channel: "Yoga with Adriene", dur: 5, cat: "yoga", emoji: "🧘", q: "Yoga with Adriene morning flow warm up 5 minutes" },
  { title: "Strength Training Warm Up Women", channel: "Caroline Girvan", dur: 5, cat: "strength", emoji: "💪", q: "Caroline Girvan 5 minute strength warm up women" },
  { title: "Low Impact Warm Up All Levels", channel: "Pahla B Fitness", dur: 5, cat: "dance", emoji: "💃", q: "Pahla B Fitness 5 minute low impact warm up women" }
];

var mainPoolA = [
  { title: "30-Min Dance Cardio Party Pop Hits", channel: "Fitness Marshall", dur: 30, cat: "dance", emoji: "💃", q: "Fitness Marshall 30 minute dance cardio pop hits women" },
  { title: "30-Min Full Body HIIT No Equipment", channel: "Sydney Cummings", dur: 30, cat: "hiit", emoji: "⚡", q: "Sydney Cummings 30 minute full body HIIT no equipment women" },
  { title: "30-Min Full Body Pilates Workout", channel: "Move with Nicole", dur: 30, cat: "pilates", emoji: "🌸", q: "Move with Nicole 30 minute full body pilates workout women" },
  { title: "30-Min Dumbbell Strength for Women", channel: "Caroline Girvan", dur: 30, cat: "strength", emoji: "💪", q: "Caroline Girvan 30 minute dumbbell strength women" },
  { title: "30-Min Power Yoga Full Body Flow", channel: "Yoga with Adriene", dur: 30, cat: "yoga", emoji: "🧘", q: "Yoga with Adriene 30 minute power yoga full body" },
  { title: "30-Min Zumba Total Body Dance", channel: "Zumba Official", dur: 30, cat: "dance", emoji: "💃", q: "Zumba Official 30 minute total body dance workout women" },
  { title: "30-Min Sculpt and Tone Full Body", channel: "Lucy Wyndham-Read", dur: 30, cat: "strength", emoji: "💪", q: "Lucy Wyndham-Read 30 minute sculpt tone full body women" },
  { title: "30-Min Vinyasa Yoga Flow", channel: "Breathe and Flow", dur: 30, cat: "yoga", emoji: "🧘", q: "Breathe and Flow 30 minute vinyasa yoga flow women" },
  { title: "30-Min Pilates Core and Glutes Burn", channel: "Blogilates", dur: 30, cat: "pilates", emoji: "🌸", q: "Blogilates 30 minute pilates core glutes burn" },
  { title: "30-Min Afrobeats Dance Fitness", channel: "Kukuwa Fitness", dur: 30, cat: "dance", emoji: "💃", q: "Kukuwa Fitness 30 minute afrobeats dance workout women" },
  { title: "30-Min Bodyweight Strength Women", channel: "Pamela Reif", dur: 30, cat: "strength", emoji: "💪", q: "Pamela Reif 30 minute full body strength women no equipment" },
  { title: "30-Min HIIT Full Body Torch", channel: "Heather Robertson", dur: 30, cat: "hiit", emoji: "⚡", q: "Heather Robertson 30 minute HIIT full body women" }
];

var mainPoolB = [
  { title: "20-Min K-Pop Dance Cardio", channel: "Emi Wong", dur: 20, cat: "dance", emoji: "💃", q: "Emi Wong 20 minute kpop dance cardio women" },
  { title: "20-Min HIIT Sweat and Burn", channel: "Emi Wong", dur: 20, cat: "hiit", emoji: "⚡", q: "Emi Wong 20 minute HIIT sweat burn women" },
  { title: "20-Min Pilates Abs and Core", channel: "Move with Nicole", dur: 20, cat: "pilates", emoji: "🌸", q: "Move with Nicole 20 minute pilates abs core women" },
  { title: "20-Min Glutes and Legs Strength", channel: "Caroline Girvan", dur: 20, cat: "strength", emoji: "💪", q: "Caroline Girvan 20 minute glutes legs strength women" },
  { title: "20-Min Feel Good Yoga Flow", channel: "Yoga with Adriene", dur: 20, cat: "yoga", emoji: "🧘", q: "Yoga with Adriene 20 minute feel good yoga flow" },
  { title: "20-Min Latin Dance Cardio Burn", channel: "BollyX", dur: 20, cat: "dance", emoji: "💃", q: "BollyX 20 minute latin dance cardio burn women" },
  { title: "20-Min Low Impact HIIT Women", channel: "Pahla B Fitness", dur: 20, cat: "hiit", emoji: "⚡", q: "Pahla B 20 minute low impact HIIT women" },
  { title: "20-Min Upper Body Strength Tone", channel: "Lucy Wyndham-Read", dur: 20, cat: "strength", emoji: "💪", q: "Lucy Wyndham-Read 20 minute upper body strength tone women" },
  { title: "20-Min Yin Yoga Deep Stretch", channel: "Yoga with Adriene", dur: 20, cat: "yoga", emoji: "🧘", q: "Yoga with Adriene 20 minute yin yoga deep stretch" },
  { title: "20-Min Pilates Butt and Thighs", channel: "Blogilates", dur: 20, cat: "pilates", emoji: "🌸", q: "Blogilates 20 minute pilates butt thighs women" },
  { title: "20-Min Step Cardio Dance", channel: "Fitness Marshall", dur: 20, cat: "dance", emoji: "💃", q: "Fitness Marshall 20 minute step cardio dance women" },
  { title: "20-Min Core and Arms Circuit", channel: "Heather Robertson", dur: 20, cat: "strength", emoji: "💪", q: "Heather Robertson 20 minute core arms circuit women" }
];

var cooldownPool = [
  { title: "10-Min Full Body Stretch Women", channel: "Sydney Cummings", dur: 10, cat: "hiit", emoji: "⚡", q: "Sydney Cummings 10 minute post workout full body stretch women" },
  { title: "10-Min Pilates Cool Down Stretch", channel: "Move with Nicole", dur: 10, cat: "pilates", emoji: "🌸", q: "Move with Nicole 10 minute pilates cool down stretch" },
  { title: "10-Min Yoga Cool Down and Restore", channel: "Yoga with Adriene", dur: 10, cat: "yoga", emoji: "🧘", q: "Yoga with Adriene 10 minute cool down restore relax" },
  { title: "10-Min Dance Cool Down Slow Stretch", channel: "Fitness Marshall", dur: 10, cat: "dance", emoji: "💃", q: "Fitness Marshall 10 minute dance cool down slow stretch women" },
  { title: "10-Min Full Body Flexibility Stretch", channel: "Caroline Girvan", dur: 10, cat: "strength", emoji: "💪", q: "Caroline Girvan 10 minute full body flexibility stretch cool down" },
  { title: "10-Min Mindful Cool Down Breathwork", channel: "Blogilates", dur: 10, cat: "pilates", emoji: "🌸", q: "Blogilates 10 minute mindful cool down breathwork women" }
];

var tagColors = {
  dance:    { bg: 'rgba(255,77,126,0.18)', color: '#FF4D7E' },
  hiit:     { bg: 'rgba(255,140,97,0.18)', color: '#FF8C61' },
  pilates:  { bg: 'rgba(255,179,71,0.18)', color: '#FFB347' },
  strength: { bg: 'rgba(62,220,176,0.18)', color: '#3EDCB0' },
  yoga:     { bg: 'rgba(176,111,232,0.18)', color: '#B06FE8' }
};

function ytUrl(q, dur) {
  var sp = dur < 4 ? 'EgIYAQ%3D%3D' : (dur <= 20 ? 'EgIYAg%3D%3D' : 'EgIYAw%3D%3D');
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q) + '&sp=' + sp;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function pickOne(pool) {
  var filtered = activeFilter === 'all' ? pool : pool.filter(function(v){ return v.cat === activeFilter; });
  var source = filtered.length > 0 ? filtered : pool;
  return shuffle(source)[0];
}

document.getElementById('filters').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  activeFilter = btn.dataset.cat;
});

document.getElementById('generateBtn').addEventListener('click', function() {
  var warmup = pickOne(warmupPool);

  var mainA = pickOne(mainPoolA);

  // For mainB, prefer different category when "all" is selected
  var bPool;
  if (activeFilter === 'all') {
    var diff = mainPoolB.filter(function(v){ return v.cat !== mainA.cat; });
    bPool = diff.length > 0 ? diff : mainPoolB;
  } else {
    var catMatch = mainPoolB.filter(function(v){ return v.cat === activeFilter; });
    bPool = catMatch.length > 0 ? catMatch : mainPoolB;
  }
  var mainB = shuffle(bPool)[0];

  var cooldown = pickOne(cooldownPool);

  var total = warmup.dur + mainA.dur + mainB.dur + cooldown.dur;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('playlistSection').style.display = 'block';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('timerTotal').textContent = total + ' min';

  var catLabel = activeFilter === 'all' ? 'Mixed Styles' : (activeFilter.charAt(0).toUpperCase() + activeFilter.slice(1));
  document.getElementById('playlistLabel').textContent = 'YOUR ' + catLabel.toUpperCase() + ' PLAYLIST  |  4 VIDEOS  |  ' + total + ' MIN';

  var container = document.getElementById('playlist');
  container.innerHTML = '';

  var sections = [
    { label: 'Warm Up', cls: 'warmup-label', items: [warmup] },
    { label: 'Main Workout', cls: 'main-label', items: [mainA, mainB] },
    { label: 'Cool Down', cls: 'cool-label', items: [cooldown] }
  ];

  var idx = 1;
  sections.forEach(function(sec) {
    var div = document.createElement('div');
    div.className = 'segment-divider';
    div.innerHTML = '<div class="seg-line"></div><span class="seg-label ' + sec.cls + '">' + sec.label + '</span><div class="seg-line"></div>';
    container.appendChild(div);

    sec.items.forEach(function(v) {
      var tc = tagColors[v.cat] || { bg: '#222', color: '#888' };
      var url = ytUrl(v.q, v.dur);
      var card = document.createElement('a');
      card.className = 'workout-card';
      card.href = url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.style.animationDelay = ((idx - 1) * 80) + 'ms';
      card.innerHTML =
        '<span class="card-num">' + idx + '</span>' +
        '<div class="tag-dot" style="background:' + tc.bg + '">' + v.emoji + '</div>' +
        '<div class="card-info">' +
          '<div class="card-title">' + v.title + '</div>' +
          '<div class="card-meta">' +
            '<span>' + v.channel + '</span>' +
            '<span class="meta-tag" style="color:' + tc.color + '">' + v.cat + '</span>' +
          '</div>' +
        '</div>' +
        '<span class="card-duration">' + v.dur + 'm</span>' +
        '<a class="yt-btn" href="' + url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">Watch</a>';
      container.appendChild(card);
      idx++;
    });
  });
});
</script>
</body>
</html>
